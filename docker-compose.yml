version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: sc_app
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:ktpbeVeWOEssf93G3o8wfk2y6nhC4/BKaxUlQReb/Uo="
      APP_URL: https://nashidify.com
      DB_HOST: db
      DB_DATABASE: sc_app
      DB_USERNAME: sc_user
      DB_PASSWORD: sc_pass
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://185.250.36.33:9000
      AWS_ACCESS_KEY_ID: sc_minio
      AWS_SECRET_ACCESS_KEY: sc_minio_secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: sc-bucket
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./app:/var/www/html
      - ./storage-logs:/var/www/html/storage/logs
    depends_on:
      - db
      - redis
      - minio
    networks:
      - sc_network

  db:
    image: mysql:8.0
    container_name: sc_db
    environment:
      MYSQL_DATABASE: sc_app
      MYSQL_USER: sc_user
      MYSQL_PASSWORD: sc_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - dbdata:/var/lib/mysql
    # Port 3306 removed - database only accessible internally via Docker network
    networks:
      - sc_network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: sc_redis
    networks:
      - sc_network

  minio:
    image: minio/minio:latest
    container_name: sc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sc_minio
      MINIO_ROOT_PASSWORD: sc_minio_secret
      MINIO_BROWSER_REDIRECT_URL: http://185.250.36.33:9001
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - sc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  ffmpeg:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    container_name: sc_ffmpeg
    entrypoint: ""
    command: ["sleep", "infinity"]
    volumes:
      - ./app:/work
      - /tmp/transcode:/tmp/transcode
    networks:
      - sc_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: sc_queue
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:ktpbeVeWOEssf93G3o8wfk2y6nhC4/BKaxUlQReb/Uo="
      DB_HOST: db
      DB_DATABASE: sc_app
      DB_USERNAME: sc_user
      DB_PASSWORD: sc_pass
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: http://minio:9000
      AWS_URL: http://185.250.36.33:9000
      AWS_ACCESS_KEY_ID: sc_minio
      AWS_SECRET_ACCESS_KEY: sc_minio_secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: sc-bucket
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - ./app:/var/www/html
      - /tmp/transcode:/tmp/transcode
    depends_on:
      - app
      - redis
      - ffmpeg
    networks:
      - sc_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: sc_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: sc_user
      PMA_PASSWORD: sc_pass
      MYSQL_ROOT_PASSWORD: rootpass
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - sc_network

  frontend:
    image: node:20-alpine
    container_name: sc_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://nashidify.com/api
    networks:
      - sc_network

  n8n:
    image: n8nio/n8n:latest
    container_name: sc_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.nashidify.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.nashidify.com/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=NashidifyN8N2026!
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_HOST=db
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_DATABASE=n8n
      - DB_MYSQLDB_USER=sc_user
      - DB_MYSQLDB_PASSWORD=sc_pass
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      - db
    networks:
      - sc_network

  telethon-api:
    build:
      context: /root
      dockerfile: Dockerfile.telethon
    container_name: sc_telethon
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - nasheeds:/app/nasheeds
      - /root/n8n_session.session:/app/n8n_session.session
    networks:
      - sc_network

  proxy:
    image: nginx:stable-alpine
    container_name: sc_proxy
    volumes:
      - ./proxy-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/var/www/html/public:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - sc_network

volumes:
  dbdata:
  miniodata:
  n8ndata:
  nasheeds:

networks:
  sc_network:
    driver: bridge

